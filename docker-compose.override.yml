version: "3.4"
services:
  catalogdb:
  container_name: catalogdb     
    environment:
      - POSTGRES_USER=postgres
      -POSTGRES_PASSWORD=postgres
      -POSTGRES_DB=CatalogDb

      restart: always 
    ports:
      - "8080"
      - "8081"
    volumes:
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro